name: Scan Git History for Secrets

on:
  workflow_dispatch:
    inputs:
      scan_depth:
        description: "Number of commits to scan (0 = full history)"
        required: false
        default: "0"

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required for complete scan

      - name: Run Gitleaks on full git history
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --source . --log-opts="--full-history --all" --verbose --redact --exit-code 1

      - name: Upload Gitleaks report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-report
          path: results.sarif
          retention-days: 7
