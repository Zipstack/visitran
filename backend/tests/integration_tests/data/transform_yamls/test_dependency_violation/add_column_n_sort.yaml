destination:
  table_name: add_column_n_sort
presentation:
  columns:
    - '*'
  sort:
    - column: inr
      order_by: ASC
source:
  materialization: TABLE
  table_name: employee
transform:
  synthesize:
    columns:
      - column_name: inr
        operation:
          formula: PRODUCT(salary,80)
        type: FORMULA
  union:
    ignore_duplicate: false
