destination:
  table_name: aggregate_n_sort
presentation:
  columns:
    - '*'
  sort:
    - column: avg_salary
      order_by: ASC
source:
  materialization: TABLE
  table_name: employee
transform:
  aggregate:
    aggregate_columns:
      - alias: avg_salary
        column: salary
        function: AVG
  group:
    - profession
  union:
    ignore_duplicate: false
