source:
  table_name: inventory
  materialization: TABLE
destination:
  table_name: inventory_tr
presentation:
  columns:
    - '*'
transform:
  join:
    - destination:
        table_name: film
      type: Inner
      criteria:
        - condition:
            lhs:
              type: COLUMN
              column:
                table_name: inventory
                column_name: film_id
                data_type: Number
            operator: EQ
            rhs:
              type: COLUMN
              column:
                table_name: film
                column_name: film_id
                data_type: Number
  union:
    ignore_duplicate: false
