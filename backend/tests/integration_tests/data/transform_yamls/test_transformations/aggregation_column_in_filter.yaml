source:
  table_name: employee
  materialization: TABLE
destination:
  table_name: aggregation_column_in_filter
presentation:
  columns:
    - '*'
transform:
  aggregate:
    aggregate_columns:
      - alias: avg_salary
        column: salary
        function: AVG
    filter:
      criteria:
        - condition:
            lhs:
              type: COLUMN
              column:
                table_name: aggregation_column_in_filter
                column_name: avg_salary
                data_type: Number
            operator: GT
            rhs:
              type: VALUE
              value:
                - 95000.0
  group:
    - profession
