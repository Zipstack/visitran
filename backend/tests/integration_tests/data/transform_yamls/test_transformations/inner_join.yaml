source:
  table_name: employee
  materialization: TABLE
destination:
  table_name: inner_join
presentation:
  columns:
    - '*'
transform:
  join:
    - destination:
        table_name: employee_home
      type: Inner
      criteria:
        - condition:
            lhs:
              type: COLUMN
              column:
                table_name: employee
                column_name: id
                data_type: Number
            operator: EQ
            rhs:
              type: COLUMN
              column:
                table_name: employee_home
                column_name: id
                data_type: Number
