syntax = "proto3";

package proto_types;

// Common event info
message EventInfo {
  string name = 1;
  string code = 2;
  string msg = 3;
  string level = 4;
  string invocation_id = 5;
  int32 pid = 6;
  string thread = 7;
  string ts = 8;
  map<string, string> extra = 9;
  string category = 10;
}

